services:
  flyway-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: https://flyway-api.zileslabs.com
    container_name: flyway-web
    restart: unless-stopped
    ports:
      - "192.168.0.66:3002:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
