services:
  flyway-api:
    build:
      context: ./api
    container_name: flyway-api
    restart: unless-stopped
    ports:
      - "192.168.0.66:3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3001"
      SUPABASE_URL: "http://host.docker.internal:8000"
      SUPABASE_ANON_KEY: "${SUPABASE_ANON_KEY}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      ALLOWED_ORIGINS: "${ALLOWED_ORIGINS}"
      PUBLIC_APP_URL: "${PUBLIC_APP_URL}"
      SECURITY_HASH_SALT: "${SECURITY_HASH_SALT}"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
